name: harmful-video-detection

x-app-base: &app-base
  image: harmful-video-detection:local
  working_dir: /workspace
  environment:
    HARM_DETECTION_ROOT: /workspace
    SPARK_LOCAL_IP: "127.0.0.1"
  volumes:
    - type: bind
      source: .
      target: /workspace

services:
  image:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
    command: ["harm-detect", "--help"]

  pipeline:
    <<: *app-base
    command: ["harm-detect", "run-all"]

  api:
    <<: *app-base
    command: ["harm-detect", "serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
